{{- if and .Values.global.observability.enabled .Values.observability.sqsExporter.enabled .Values.localstack.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "meta-chart.sqsExporterName" . }}
  labels:
    {{- include "meta-chart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "meta-chart.sqsExporterName" . }}
  labels:
    {{- include "meta-chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "meta-chart.sqsExporterName" . }}
  labels:
    {{- include "meta-chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "meta-chart.sqsExporterName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "meta-chart.sqsExporterName" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meta-chart.sqsExporterName" . }}
  labels:
    {{- include "meta-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: sqs-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "meta-chart.sqsExporterName" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "meta-chart.sqsExporterName" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: sqs-exporter
    spec:
      serviceAccountName: {{ include "meta-chart.sqsExporterName" . }}
      {{- with .Values.observability.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.observability.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sqs-exporter
          image: "{{ .Values.observability.sqsExporter.image.repository }}:{{ .Values.observability.sqsExporter.image.tag }}"
          imagePullPolicy: {{ .Values.observability.sqsExporter.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.observability.sqsExporter.service.port }}
              protocol: TCP
          env:
            - name: DASS_SQS_ENDPOINT_URL
              value: {{ printf "http://%s:4566" (include "meta-chart.localstackHost" .) | quote }}
            - name: DASS_AWS_REGION
              value: {{ .Values.global.app.awsRegion | quote }}
            - name: DASS_AWS_ACCESS_KEY_ID
              value: {{ .Values.global.app.awsAccessKeyId | quote }}
            - name: DASS_AWS_SECRET_ACCESS_KEY
              value: {{ .Values.global.app.awsSecretAccessKey | quote }}
            - name: DASS_SQS_EXPORTER_INTERVAL
              value: {{ .Values.observability.sqsExporter.intervalSeconds | quote }}
            - name: DASS_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: DASS_WORKER_LABEL_SELECTOR
              value: {{ printf "app.kubernetes.io/name=worker,app.kubernetes.io/instance=%s" .Release.Name | quote }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "meta-chart.sqsExporterName" . }}
  labels:
    {{- include "meta-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: sqs-exporter
spec:
  ports:
    - name: metrics
      port: {{ .Values.observability.sqsExporter.service.port }}
      targetPort: metrics
  selector:
    app.kubernetes.io/name: {{ include "meta-chart.sqsExporterName" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "meta-chart.sqsExporterName" . }}
  labels:
    {{- include "meta-chart.labels" . | nindent 4 }}
    release: {{ .Values.global.observability.releaseLabel | quote }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: sqs-exporter
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: metrics
      interval: {{ .Values.observability.sqsExporter.serviceMonitor.interval }}
{{- end }}
