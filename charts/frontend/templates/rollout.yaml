{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ ternary .Values.autoscaling.minReplicas .Values.replicaCount .Values.autoscaling.enabled }}
  revisionHistoryLimit: {{ .Values.rollout.revisionHistoryLimit }}
  progressDeadlineSeconds: {{ .Values.rollout.progressDeadlineSeconds }}
  progressDeadlineAbort: {{ .Values.rollout.progressDeadlineAbort }}
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "frontend.fullname" . }}
    scaleDown: {{ .Values.rollout.workloadRef.scaleDown }}
  strategy:
    canary:
      maxSurge: {{ .Values.rollout.canary.maxSurge | quote }}
      maxUnavailable: {{ .Values.rollout.canary.maxUnavailable | quote }}
      steps:
        {{- toYaml .Values.rollout.canary.steps | nindent 8 }}
{{- end }}
